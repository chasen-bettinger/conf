bw:
  source: bitwarden/clients
  version: 2026.2.0
  binary: bw
  # Default fits darwin-arm64 only (the only platform where bitwarden includes the arch in the filename).
  asset_template: "https://github.com/{source}/releases/download/cli-v{version}/bw-{os}-{arch}-{version}.zip"
  asset_template_overrides:
    # Linux + intel-mac assets omit the {arch} segment.
    linux-amd64: "https://github.com/{source}/releases/download/cli-v{version}/bw-{os}-{version}.zip"
    darwin-amd64: "https://github.com/{source}/releases/download/cli-v{version}/bw-{os}-{version}.zip"
    # No published linux-arm64 build at the time of writing; populate when bitwarden ships one.
    linux-arm64: ""
  os_map:
    darwin: macos
  # Bitwarden doesn't publish a checksums file alongside the CLI release.
  # Opt in to local hashing so get_checksums can populate hashes by downloading the asset.
  # Trust caveat: registry hashes for this entry come from our local download, not upstream.
  local_checksums_fallback: true
  checksums:
    linux-amd64: "8d73e2a471993db8b2e6e4f69293a71e28e9b4c2cb4b696665f5f396126e1850"
    linux-arm64: ""
    darwin-amd64: 60cc5109b1cdad560231e02098f1ab2d16efa821d51c6ec089cb5c3cc351b2e5
    darwin-arm64: 63c736b74620280e422ce238bdbcbc267689a0ff831168959ef2124588fcc1e5
